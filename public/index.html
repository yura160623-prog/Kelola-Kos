<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="description" content="KelolaKos - Aplikasi manajemen kos sederhana, ringan, mobile-first." />
  <title>KelolaKos</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/style.css" />
  <script defer src="/js/app.js"></script>
  <script defer src="/js/vendor/alpine.min.js"></script>
</head>
<body>
  <div id="app" x-data="kelolaKos" x-cloak>

    <!-- ================= AUTH ================= -->
    <template x-if="!user">
      <main class="auth-screen">
        <div class="auth-card">
          <div class="brand">
            <img src="/icons/icon.svg" alt="" width="56" height="56" />
            <h1>KelolaKos</h1>
            <p class="muted">Manajemen kos dalam genggaman</p>
          </div>

          <div class="tabs">
            <button :class="{ active: authMode === 'login' }" @click="authMode='login'; authError=''">Masuk</button>
            <button x-show="registrationOpen" :class="{ active: authMode === 'register' }" @click="authMode='register'; authError=''">Daftar</button>
          </div>

          <form @submit.prevent="submitAuth()">
            <template x-if="authMode === 'register'">
              <div>
                <label>Nama Lengkap</label>
                <input type="text" x-model="authForm.name" placeholder="Nama pemilik kos" required />
              </div>
            </template>

            <label>Username</label>
            <input type="text" x-model="authForm.username" placeholder="username" autocomplete="username" required />

            <template x-if="authMode === 'register'">
              <div>
                <label>Nomor HP (opsional)</label>
                <input type="tel" x-model="authForm.phone" placeholder="08xxxxxxxxxx" />
              </div>
            </template>

            <label>Password</label>
            <input type="password" x-model="authForm.password" placeholder="Minimal 6 karakter" autocomplete="current-password" required />

            <p class="error" x-show="authError" x-text="authError"></p>

            <button type="submit" class="btn-primary" :disabled="loading">
              <span x-text="authMode === 'login' ? 'Masuk' : 'Daftar'"></span>
            </button>
          </form>
        </div>
      </main>
    </template>

    <!-- ================= APP ================= -->
    <template x-if="user">
      <div class="shell">
        <header class="topbar">
          <div>
            <strong x-text="pageTitle()"></strong>
          </div>
          <div class="topbar-right">
            <span class="muted hide-sm" x-text="user.name"></span>
            <button class="icon-btn" @click="logout()" title="Keluar">&#x23FB;</button>
          </div>
        </header>

        <main class="content">
          <!-- ===== DASHBOARD ===== -->
          <section x-show="page === 'dashboard'">
            <div class="grid-2">
              <div class="stat-card">
                <span class="stat-label">Kamar Terisi</span>
                <span class="stat-value" x-text="(dash.rooms?.occupied||0) + ' / ' + (dash.rooms?.total||0)"></span>
              </div>
              <div class="stat-card">
                <span class="stat-label">Kamar Kosong</span>
                <span class="stat-value" x-text="dash.rooms?.available||0"></span>
              </div>
              <div class="stat-card">
                <span class="stat-label">Penghuni Aktif</span>
                <span class="stat-value" x-text="dash.activeTenants||0"></span>
              </div>
              <div class="stat-card">
                <span class="stat-label">Maintenance</span>
                <span class="stat-value" x-text="dash.rooms?.maintenance||0"></span>
              </div>
            </div>

            <div class="income-card">
              <span class="stat-label">Pemasukan Bulan Ini</span>
              <span class="income-value" x-text="rupiah(dash.incomeThisMonth||0)"></span>
              <span class="muted" x-text="'Tunggakan: ' + rupiah(dash.outstanding?.total||0) + ' (' + (dash.outstanding?.count||0) + ' tagihan)'"></span>
            </div>

            <template x-if="dash.trend && dash.trend.length">
              <div class="card">
                <h3>Tren Pemasukan</h3>
                <div class="bars">
                  <template x-for="t in dash.trend" :key="t.year+'-'+t.month">
                    <div class="bar-col">
                      <div class="bar" :style="'height:'+ barHeight(t.total) +'px'" :title="rupiah(t.total)"></div>
                      <span class="bar-label" x-text="monthShort(t.month)"></span>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <div class="card">
              <h3>Tagihan Belum Lunas</h3>
              <template x-if="!dash.dueList || !dash.dueList.length">
                <p class="muted">Tidak ada tunggakan. </p>
              </template>
              <ul class="list">
                <template x-for="d in (dash.dueList||[])" :key="d.id">
                  <li class="list-row">
                    <div>
                      <strong x-text="d.tenant_name || '(tanpa penghuni)'"></strong>
                      <div class="muted small" x-text="'Kamar ' + (d.room_number||'-') + ' | ' + monthName(d.period_month) + ' ' + d.period_year"></div>
                    </div>
                    <div class="right">
                      <span x-text="rupiah(d.amount)"></span>
                      <span class="badge" :class="'badge-'+d.status" x-text="statusLabel(d.status)"></span>
                    </div>
                  </li>
                </template>
              </ul>
            </div>
          </section>

          <!-- ===== ROOMS ===== -->
          <section x-show="page === 'rooms'">
            <div class="toolbar">
              <input type="search" placeholder="Cari kamar..." x-model="roomSearch" @input.debounce.300ms="loadRooms()" />
              <select x-model="roomFilter" @change="loadRooms()">
                <option value="">Semua</option>
                <option value="available">Tersedia</option>
                <option value="occupied">Terisi</option>
                <option value="maintenance">Maintenance</option>
              </select>
              <button class="btn-primary" @click="openRoomForm()">+ Kamar</button>
            </div>
            <template x-if="!rooms.length">
              <p class="muted empty">Belum ada kamar. Tambahkan kamar pertama Anda.</p>
            </template>
            <ul class="list">
              <template x-for="r in rooms" :key="r.id">
                <li class="list-row">
                  <div>
                    <strong x-text="'Kamar ' + r.room_number"></strong>
                    <div class="muted small" x-text="typeLabel(r.type) + ' | ' + rupiah(r.price) + '/bln'"></div>
                  </div>
                  <div class="right">
                    <span class="badge" :class="'room-'+r.status" x-text="roomStatusLabel(r.status)"></span>
                    <div class="row-actions">
                      <button class="link" @click="openRoomForm(r)">Edit</button>
                      <button class="link danger" @click="deleteRoom(r)">Hapus</button>
                    </div>
                  </div>
                </li>
              </template>
            </ul>
          </section>

          <!-- ===== TENANTS ===== -->
          <section x-show="page === 'tenants'">
            <div class="toolbar">
              <input type="search" placeholder="Cari penghuni..." x-model="tenantSearch" @input.debounce.300ms="loadTenants()" />
              <select x-model="tenantFilter" @change="loadTenants()">
                <option value="">Semua</option>
                <option value="active">Aktif</option>
                <option value="moved_out">Keluar</option>
              </select>
              <button class="btn-primary" @click="openTenantForm()">+ Penghuni</button>
            </div>
            <template x-if="!tenants.length">
              <p class="muted empty">Belum ada penghuni.</p>
            </template>
            <ul class="list">
              <template x-for="t in tenants" :key="t.id">
                <li class="list-row">
                  <div>
                    <strong x-text="t.name"></strong>
                    <div class="muted small" x-text="'Kamar ' + (t.room_number||'-') + (t.phone ? ' | ' + t.phone : '')"></div>
                  </div>
                  <div class="right">
                    <span class="badge" :class="t.status==='active'?'badge-paid':'badge-unpaid'" x-text="t.status==='active'?'Aktif':'Keluar'"></span>
                    <div class="row-actions">
                      <button class="link" @click="openTenantForm(t)">Edit</button>
                      <button class="link danger" @click="deleteTenant(t)">Hapus</button>
                    </div>
                  </div>
                </li>
              </template>
            </ul>
          </section>

          <!-- ===== PAYMENTS ===== -->
          <section x-show="page === 'payments'">
            <div class="toolbar">
              <select x-model="payMonth" @change="loadPayments()">
                <template x-for="m in 12" :key="m">
                  <option :value="m" x-text="monthName(m)"></option>
                </template>
              </select>
              <select x-model="payYear" @change="loadPayments()">
                <template x-for="y in yearOptions" :key="y">
                  <option :value="y" x-text="y"></option>
                </template>
              </select>
              <select x-model="payStatus" @change="loadPayments()">
                <option value="">Semua</option>
                <option value="unpaid">Belum</option>
                <option value="paid">Lunas</option>
                <option value="late">Telat</option>
              </select>
            </div>
            <div class="toolbar">
              <button class="btn-secondary" @click="generateBills()">Generate Tagihan Bulan Ini</button>
              <button class="btn-primary" @click="openPaymentForm()">+ Bayar</button>
            </div>
            <template x-if="!payments.length">
              <p class="muted empty">Belum ada data pembayaran untuk periode ini.</p>
            </template>
            <ul class="list">
              <template x-for="p in payments" :key="p.id">
                <li class="list-row">
                  <div>
                    <strong x-text="p.tenant_name || '(penghuni dihapus)'"></strong>
                    <div class="muted small" x-text="'Kamar ' + (p.room_number||'-') + ' | ' + rupiah(p.amount)"></div>
                  </div>
                  <div class="right">
                    <span class="badge" :class="'badge-'+p.status" x-text="statusLabel(p.status)"></span>
                    <div class="row-actions">
                      <button class="link" x-show="p.status!=='paid'" @click="markPaid(p)">Lunasi</button>
                      <button class="link" @click="openPaymentForm(p)">Edit</button>
                      <button class="link danger" @click="deletePayment(p)">Hapus</button>
                    </div>
                  </div>
                </li>
              </template>
            </ul>
          </section>
        </main>

        <!-- ===== BOTTOM NAV ===== -->
        <nav class="bottom-nav">
          <button :class="{active: page==='dashboard'}" @click="go('dashboard')">
            <span class="nav-ico">&#9632;</span><span>Beranda</span>
          </button>
          <button :class="{active: page==='rooms'}" @click="go('rooms')">
            <span class="nav-ico">&#8862;</span><span>Kamar</span>
          </button>
          <button :class="{active: page==='tenants'}" @click="go('tenants')">
            <span class="nav-ico">&#9679;</span><span>Penghuni</span>
          </button>
          <button :class="{active: page==='payments'}" @click="go('payments')">
            <span class="nav-ico">&#164;</span><span>Bayar</span>
          </button>
        </nav>

        <!-- ===== MODAL ===== -->
        <div class="modal-overlay" x-show="modal" @click.self="closeModal()" x-transition.opacity>
          <div class="modal">
            <!-- Room form -->
            <template x-if="modal === 'room'">
              <form @submit.prevent="saveRoom()">
                <h3 x-text="form.id ? 'Edit Kamar' : 'Tambah Kamar'"></h3>
                <label>Nomor Kamar</label>
                <input type="text" x-model="form.room_number" required />
                <label>Tipe</label>
                <select x-model="form.type">
                  <option value="single">Single</option>
                  <option value="shared">Shared</option>
                </select>
                <label>Harga Sewa / bulan</label>
                <input type="number" x-model.number="form.price" min="0" />
                <label>Status</label>
                <select x-model="form.status">
                  <option value="available">Tersedia</option>
                  <option value="occupied">Terisi</option>
                  <option value="maintenance">Maintenance</option>
                </select>
                <label>Catatan</label>
                <input type="text" x-model="form.notes" />
                <p class="error" x-show="formError" x-text="formError"></p>
                <div class="modal-actions">
                  <button type="button" class="btn-secondary" @click="closeModal()">Batal</button>
                  <button type="submit" class="btn-primary" :disabled="loading">Simpan</button>
                </div>
              </form>
            </template>

            <!-- Tenant form -->
            <template x-if="modal === 'tenant'">
              <form @submit.prevent="saveTenant()">
                <h3 x-text="form.id ? 'Edit Penghuni' : 'Tambah Penghuni'"></h3>
                <label>Nama</label>
                <input type="text" x-model="form.name" required />
                <label>Nomor HP</label>
                <input type="tel" x-model="form.phone" placeholder="08xxxxxxxxxx" />
                <label>Kamar</label>
                <select x-model.number="form.room_id">
                  <option :value="null">- Tanpa kamar -</option>
                  <template x-for="r in rooms" :key="r.id">
                    <option :value="r.id" x-text="'Kamar ' + r.room_number"></option>
                  </template>
                </select>
                <label>No. Identitas (opsional)</label>
                <input type="text" x-model="form.identity_number" />
                <label>Tanggal Masuk</label>
                <input type="date" x-model="form.start_date" />
                <label>Status</label>
                <select x-model="form.status">
                  <option value="active">Aktif</option>
                  <option value="moved_out">Keluar</option>
                </select>
                <p class="error" x-show="formError" x-text="formError"></p>
                <div class="modal-actions">
                  <button type="button" class="btn-secondary" @click="closeModal()">Batal</button>
                  <button type="submit" class="btn-primary" :disabled="loading">Simpan</button>
                </div>
              </form>
            </template>

            <!-- Payment form -->
            <template x-if="modal === 'payment'">
              <form @submit.prevent="savePayment()">
                <h3 x-text="form.id ? 'Edit Pembayaran' : 'Catat Pembayaran'"></h3>
                <template x-if="!form.id">
                  <div>
                    <label>Penghuni</label>
                    <select x-model.number="form.tenant_id" required>
                      <option value="">- Pilih penghuni -</option>
                      <template x-for="t in activeTenants" :key="t.id">
                        <option :value="t.id" x-text="t.name + ' (Kamar ' + (t.room_number||'-') + ')'"></option>
                      </template>
                    </select>
                    <div class="grid-2">
                      <div>
                        <label>Bulan</label>
                        <select x-model.number="form.period_month">
                          <template x-for="m in 12" :key="m">
                            <option :value="m" x-text="monthName(m)"></option>
                          </template>
                        </select>
                      </div>
                      <div>
                        <label>Tahun</label>
                        <input type="number" x-model.number="form.period_year" />
                      </div>
                    </div>
                  </div>
                </template>
                <label>Jumlah</label>
                <input type="number" x-model.number="form.amount" min="0" />
                <label>Status</label>
                <select x-model="form.status">
                  <option value="unpaid">Belum Bayar</option>
                  <option value="paid">Lunas</option>
                  <option value="late">Telat</option>
                </select>
                <label>Metode</label>
                <select x-model="form.payment_method">
                  <option value="">-</option>
                  <option value="cash">Tunai</option>
                  <option value="transfer">Transfer</option>
                  <option value="e-wallet">E-Wallet</option>
                </select>
                <label>Tanggal Bayar</label>
                <input type="date" x-model="form.paid_date" />
                <label>Catatan</label>
                <input type="text" x-model="form.notes" />
                <p class="error" x-show="formError" x-text="formError"></p>
                <div class="modal-actions">
                  <button type="button" class="btn-secondary" @click="closeModal()">Batal</button>
                  <button type="submit" class="btn-primary" :disabled="loading">Simpan</button>
                </div>
              </form>
            </template>
          </div>
        </div>

        <!-- ===== TOAST ===== -->
        <div class="toast" x-show="toast" x-transition x-text="toast"></div>
      </div>
    </template>
  </div>
</body>
</html>
